name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio-client/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          # Set this in repo Settings -> Secrets and variables -> Actions ->
          # Variables (name: VITE_API_URL, value: https://<your-railway-host>).
          # If unset the client falls back to the bundled static settings.json.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: studio-client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
